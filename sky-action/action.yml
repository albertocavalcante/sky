name: 'Sky Test'
description: 'Run Starlark tests with skytest - cross-platform (Linux, macOS, Windows)'
author: 'albertocavalcante'

inputs:
  path:
    description: 'Path to test files'
    required: false
    default: '.'
  recursive:
    description: 'Search directories recursively'
    required: false
    default: 'true'
  coverage:
    description: 'Enable coverage collection'
    required: false
    default: 'false'
  coverage-threshold:
    description: 'Minimum coverage percentage (0 to disable)'
    required: false
    default: '0'
  annotations:
    description: 'Enable GitHub annotations'
    required: false
    default: 'true'
  summary:
    description: 'Write to job summary'
    required: false
    default: 'true'
  version:
    description: 'Sky module version, branch, or commit hash to install. Defaults to the action ref.'
    required: false
    default: ''
  fail-fast:
    description: 'Stop on first test failure'
    required: false
    default: 'false'
  timeout:
    description: 'Timeout per test (Go duration format, e.g., 30s, 1m)'
    required: false
    default: '30s'

outputs:
  passed:
    description: 'Number of passed tests'
    value: ${{ steps.test.outputs.passed }}
  failed:
    description: 'Number of failed tests'
    value: ${{ steps.test.outputs.failed }}
  coverage:
    description: 'Coverage percentage'
    value: ${{ steps.test.outputs.coverage }}

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
      with:
        go-version: '1.25'
        cache: true

    - name: Install sky tools
      shell: bash
      run: |
        version="${{ inputs.version }}"
        if [ -z "$version" ]; then
          version="${GITHUB_ACTION_REF:-main}"
        fi
        go install "github.com/albertocavalcante/sky/cmd/skytest@${version}"
        go install "github.com/albertocavalcante/sky/cmd/sky-ci@${version}"

    # Pipeline pattern: skytest outputs JSON, sky-ci transforms to GitHub format
    # This is cross-platform - bash is available on all GitHub runners
    - name: Run tests
      id: test
      shell: bash
      run: |
        FLAGS=""
        if [ "${{ inputs.recursive }}" = "true" ]; then
          FLAGS="$FLAGS -r"
        fi
        if [ "${{ inputs.fail-fast }}" = "true" ]; then
          FLAGS="$FLAGS -x"
        fi
        if [ "${{ inputs.timeout }}" != "" ]; then
          FLAGS="$FLAGS -timeout=${{ inputs.timeout }}"
        fi

        # Run tests and pipe to CI reporter
        # shellcheck disable=SC2086
        skytest -json $FLAGS "${{ inputs.path }}" | sky-ci \
          --annotations=${{ inputs.annotations }} \
          --summary=${{ inputs.summary }} \
          --coverage-threshold=${{ inputs.coverage-threshold }}

branding:
  icon: 'check-circle'
  color: 'blue'
