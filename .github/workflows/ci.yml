name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # Tracks go.mod's `go` directive. Sky bumped to 1.26 alongside the
  # bazel-cst-go / starlark-cst-go / starlark-format-go dep introduction
  # (their go.mod declares 1.26). govulncheck refuses to load packages
  # whose required Go version exceeds the toolchain's, so this must
  # match the floor in go.mod or jobs that compile sky will fail with
  # `go.mod requires go >= 1.26 (running go 1.X)`.
  GO_VERSION: "1.26"

jobs:
  # ===========================================================================
  # Job 1: Go Build & Test (module compatibility)
  # ===========================================================================
  go-build:
    name: Go Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      # Checkout sky into ./sky/ so the sibling library repos can sit
      # alongside at ../starlark-cst-go etc., matching the relative
      # `replace` directives in go.mod. See docs/PLAN-cst-library-
      # versioning.md for the migration to versioned `require`.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          path: sky

      # Sibling library repos for the formatter.CST engine's local
      # replace directives. Private — requires LIBRARIES_PAT secret with
      # `repo` scope on each. The fallback `${{ secrets.GITHUB_TOKEN }}`
      # ONLY works if the libraries become public; for private repos the
      # PAT is required and this checkout will fail without it.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/bazel-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: bazel-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-format-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-format-go

      # actions/setup-go v6.2.0
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: sky/go.sum

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        working-directory: sky
        run: go mod download

      - name: Verify go.mod is tidy
        working-directory: sky
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum not tidy" && exit 1)

      - name: Build
        working-directory: sky
        run: go build -v ./...

      - name: Test
        working-directory: sky
        run: go tool -modfile=tools/testsum/go.mod gotestsum --format pkgname-and-test-fails --jsonfile test-output.json -- -race -timeout 10m ./...

  # ===========================================================================
  # Job 2: Bazel Build & Test (primary build system)
  # ===========================================================================
  bazel-build:
    name: Bazel Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      # actions/checkout v6.0.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      # bazel-contrib/setup-bazel v0.18.0
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Bazel version
        run: bazel --version

      - name: Build all targets
        run: bazel build //...

      - name: Run all tests
        run: bazel test //... --test_output=errors

  # ===========================================================================
  # Job 3: Lint
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      # Multi-checkout to satisfy go.mod relative `replace` directives.
      # See go-build job above for full rationale.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          path: sky

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/bazel-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: bazel-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-format-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-format-go

      # actions/setup-go v6.2.0
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: sky/go.sum

      # golangci/golangci-lint-action v9.2.0
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: latest
          args: --timeout=5m
          working-directory: sky

  # ===========================================================================
  # Job 4: Format Check
  # ===========================================================================
  format:
    name: Format Check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      # Multi-checkout to satisfy go.mod relative `replace` directives.
      # See go-build job above for full rationale.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          path: sky

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/bazel-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: bazel-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-format-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-format-go

      # actions/setup-go v6.2.0
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false  # Don't need cache for format check

      - name: Check Go formatting
        working-directory: sky
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*' -not -path './bazel-*'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix"
            exit 1
          fi
          echo "All Go files are properly formatted"

      - name: Check go.mod formatting
        working-directory: sky
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "go.mod or go.sum needs tidying"
            git diff go.mod go.sum
            exit 1
          fi

  # ===========================================================================
  # Job 5: Shell Script Lint
  # ===========================================================================
  shell-lint:
    name: Shell Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      # actions/checkout v6.0.1
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Install shfmt
        run: |
          curl -sS https://webinstall.dev/shfmt | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run shellcheck
        run: |
          shellcheck $(find . -name '*.sh' -not -path './vendor/*' -not -path './bazel-*')

      - name: Run shfmt
        run: |
          shfmt -d -i 2 -ci $(find . -name '*.sh' -not -path './vendor/*' -not -path './bazel-*')

  # ===========================================================================
  # Job 6: Security Scan (optional but recommended)
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    steps:
      # Multi-checkout to satisfy go.mod relative `replace` directives.
      # See go-build job above for full rationale.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 1
          persist-credentials: false
          path: sky

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/bazel-cst-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: bazel-cst-go

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: albertocavalcante/starlark-format-go
          token: ${{ secrets.LIBRARIES_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 1
          persist-credentials: false
          path: starlark-format-go

      # actions/setup-go v6.2.0
      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: sky/go.sum

      - name: Run govulncheck
        working-directory: sky
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Run govulncheck - exit 3 means only stdlib vulnerabilities (acceptable)
          govulncheck ./... && exit 0 || rc=$?
          if [ $rc -eq 3 ]; then
            echo "::warning::govulncheck found stdlib vulnerabilities only - acceptable"
            exit 0
          fi
          exit $rc
