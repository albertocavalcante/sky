name: Snapshot

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, commit, or ref to build"
        required: false
        type: string
        default: "main"
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  build:
    name: Build Snapshot
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Compute immutable version
        id: version
        run: |
          commit="$(git rev-parse HEAD)"
          short_commit="$(git rev-parse --short=12 HEAD)"
          commit_date="$(git show -s --format=%cI HEAD)"
          timestamp="$(date -u -d "$commit_date" +%Y%m%d%H%M%S)"
          version="v0.0.0-${timestamp}-${short_commit}"

          {
            echo "commit=${commit}"
            echo "short_commit=${short_commit}"
            echo "date=${commit_date}"
            echo "timestamp=${timestamp}"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

          echo "Building ${version}"

      - name: Build sky minimal
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w \
            -X github.com/albertocavalcante/sky/internal/version.version=${{ steps.version.outputs.version }} \
            -X github.com/albertocavalcante/sky/internal/version.commit=${{ steps.version.outputs.commit }} \
            -X github.com/albertocavalcante/sky/internal/version.date=${{ steps.version.outputs.date }}" \
            -o dist/sky-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/sky

      - name: Build sky full
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -tags=sky_full -ldflags="-s -w \
            -X github.com/albertocavalcante/sky/internal/version.version=${{ steps.version.outputs.version }} \
            -X github.com/albertocavalcante/sky/internal/version.commit=${{ steps.version.outputs.commit }} \
            -X github.com/albertocavalcante/sky/internal/version.date=${{ steps.version.outputs.date }}" \
            -o dist/sky_full-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/sky

      - name: Build standalone tools
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          for tool in skyfmt skylint skycheck skyquery skydoc skytest skyrepl skyls skycov sky-ci; do
            go build -trimpath -ldflags="-s -w \
              -X github.com/albertocavalcante/sky/internal/version.version=${{ steps.version.outputs.version }} \
              -X github.com/albertocavalcante/sky/internal/version.commit=${{ steps.version.outputs.commit }} \
              -X github.com/albertocavalcante/sky/internal/version.date=${{ steps.version.outputs.date }}" \
              -o dist/${tool}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
              ./cmd/${tool}
          done

      - name: Create checksums
        working-directory: dist
        run: sha256sum ./* > checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: sky-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 30

  summary:
    name: Snapshot Summary
    runs-on: ubuntu-24.04
    needs: build
    if: always()
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Summarize
        run: |
          short_commit="$(git rev-parse --short=12 HEAD)"
          commit_date="$(git show -s --format=%cI HEAD)"
          timestamp="$(date -u -d "$commit_date" +%Y%m%d%H%M%S)"
          version="v0.0.0-${timestamp}-${short_commit}"

          {
            echo "## Snapshot"
            echo ""
            echo "- Version: \`${version}\`"
            echo "- Commit: \`$(git rev-parse HEAD)\`"
            echo "- Commit date: \`${commit_date}\`"
            echo ""
            echo "No tag or GitHub Release was created. Artifacts are attached to this workflow run."
          } >> "$GITHUB_STEP_SUMMARY"
